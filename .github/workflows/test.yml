name: Python CI

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Debug Python
        run: |
          which python3
          python3 --version
          python3 -m pip --version

      - name: Install Dependencies
        run: |
          python3 -m pip install pytest

      - name: Run Tests
        run: |
          cd src
          python3 -m pytest test_addition.py -v
