name: Python CI

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Python
        run: python3 --version

      - name: Install Dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pytest

      - name: Run Tests
        run: |
          cd src
          python3 -m pytest test_addition.py -v
