name: Python CI

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Create Virtual Environment
        run: |
          python3 -m venv venv

      - name: Install Dependencies
        run: |
          . venv/bin/activate
          pip install --upgrade pip
          pip install pytest

      - name: Run Tests
        run: |
          . venv/bin/activate
          cd src
          pytest test_addition.py -v
